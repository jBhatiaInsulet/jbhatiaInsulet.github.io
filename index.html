<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Partner Integration</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="page-header text-center mb-4">
                    <h1 class="page-title">
                        <span class="icon">🔗</span>
                        Partner Integration
                    </h1>
                </div>

                <!-- Environment Dropdown -->
                <div class="mb-4">
                    <label for="environment" class="form-label">
                        <span class="icon">🌐</span>
                        Environment
                    </label>
                    <select class="form-select" id="environment" aria-label="Environment">
                        <option value="" selected>-- Select Environment --</option>
                        <option value="dev">Dev Prog</option>
                        <option value="qa">QA</option>
                        <option value="preprod">Pre Prod</option>
                    </select>
                </div>

                <form id="urlForm">
                    <!-- Partner Name Dropdown -->
                    <div class="mb-4">
                        <label for="clientId" class="form-label">
                            <span class="icon">👥</span>
                            Partner Name
                        </label>
                        <select class="form-select" id="clientId" aria-label="Partner Name">
                            <option value="" selected>-- Select Partner --</option>
                            <option value="0oabpdi4tiT8wvJco0x7">Stenopool</option>
                        </select>
                    </div>


                    <!-- Generated URL Text Area -->
                    <div class="mb-4">
                        <label for="generatedUrl" class="form-label">
                            <span class="icon">📝</span>
                            Generated URL
                        </label>
                        <textarea class="form-control" id="generatedUrl" rows="5" readonly
                            placeholder="Select both Partner Name and Environment to generate URL..."></textarea>
                    </div>

                    <!-- Navigate Button -->
                    <div class="d-grid">
                        <button type="button" class="btn btn-primary btn-lg" id="navigateBtn" disabled>
                            🔗 Link to Omnipod® 5
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Get DOM elements
        const clientIdSelect = document.getElementById('clientId');
        const environmentSelect = document.getElementById('environment');
        const generatedUrlTextarea = document.getElementById('generatedUrl');
        const navigateBtn = document.getElementById('navigateBtn');

        // Function to convert environment name to URL format
        function getEnvironmentSlug(environment) {
            // Convert to lowercase and remove spaces
            return environment.toLowerCase().replace(/\s+/g, '');
        }

        // Function to update URL and button state
        async function updateUrl() {
            const clientId = clientIdSelect.value;
            const environment = environmentSelect.value;
            const { codeVerifier, codeChallenge } = await generateCodeChallenge();
            const state = generateState();
            // Check if both values are selected
            if (clientId && environment) {
                // Construct the URL dynamically
                const envSlug = getEnvironmentSlug(environment);

                const relayStateValue = encodeURIComponent(`/s/edsp?client_id=${clientId}&code_challenge=${codeChallenge}&state=${state}`);

                // Build the return URL with encoded RelayState
                const returnUrl = `https://oktadev-eu.omnipod.com/app/salesforce/exk1pblh38RCagT5M0x7/sso/saml?RelayState=${relayStateValue}`;

                // Build the full URL with proper encoding
                const fullUrl = `https://account-intl${envSlug}.omnipod.com/?app=self&returnURL=${encodeURIComponent(returnUrl)}`;

                // Update textarea
                generatedUrlTextarea.value = fullUrl;

                // Enable button
                navigateBtn.disabled = false;
            } else {
                // Clear textarea and disable button if either dropdown is empty
                generatedUrlTextarea.value = '';
                navigateBtn.disabled = true;
            }
        }

        function base64UrlEncode(arrayBuffer) {
            const bytes = new Uint8Array(arrayBuffer);
            let binary = '';
            for (let i = 0; i < bytes.length; i++) {
                binary += String.fromCharCode(bytes[i]);
            }
            return btoa(binary)
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
        }


        // Generate PKCE code verifier for 64 characters
        function generateCodeVerifier(length = 64) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~';
            const randomValues = new Uint8Array(length);
            crypto.getRandomValues(randomValues);
            return Array.from(randomValues, byte => chars[byte % chars.length]).join('');
        }

        // Generate PKCE code challenge and verifier
        async function generateCodeChallenge() {
            const codeVerifier = generateCodeVerifier();
            const encoder = new TextEncoder();
            const data = encoder.encode(codeVerifier);
            const hash = await crypto.subtle.digest("SHA-256", data);
            const codeChallenge = base64UrlEncode(hash);
            // Remove the old code verifier and client id from Session Storage
            sessionStorage.removeItem('pkceCodeVerifier');
            sessionStorage.removeItem('clientId');
            // Save the Code verifier in Session Storage
            sessionStorage.setItem('pkceCodeVerifier', codeVerifier);
            sessionStorage.setItem('clientId', clientIdSelect.value);
            return { codeVerifier, codeChallenge };
        }


        function generateState() {
            return 'state-296bc9a0-a2a2-4a57-be1a-d0e2fd9bb601';
        }

        // Function to navigate to the URL
        function navigateToUrl() {
            const url = generatedUrlTextarea.value;
            if (url) {
                window.open(url, '_blank');
            }
        }

        // Add event listeners
        clientIdSelect.addEventListener('change', updateUrl);
        environmentSelect.addEventListener('change', updateUrl);
        navigateBtn.addEventListener('click', navigateToUrl);
    </script>
</body>

</html>
