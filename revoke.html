<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Revoke Account Linking</title>
    <link href="vendor/bootstrap-5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="styles.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="page-header text-center mb-4">
                    <h1 class="page-title">
                        <span class="icon">🔓</span>
                        Revoke Account Linking
                    </h1>
                </div>

                <form id="revokeForm" novalidate>
                    <div class="mb-4">
                        <label for="environment" class="form-label">
                            <span class="icon">🌐</span>
                            Environment
                        </label>
                        <select class="form-select" id="environment" aria-label="Environment" required>
                            <option value="" selected>-- Select Environment --</option>
                            <option value="dev">Dev Prog</option>
                            <option value="qa">QA</option>
                            <option value="preprod">Pre Prod</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="clientId" class="form-label">
                            <span class="icon">👥</span>
                            Partner
                        </label>
                        <select class="form-select" id="clientId" aria-label="Partner" required>
                            <option value="" selected>-- Select Partner --</option>
                            <option id="stenopool-option" value="0oabpdi4tiT8wvJco0x7">Stenopool</option>
                            <option id="test-edsp-option" value="0oad7jq9qeVOQsgFs0x7">Test EDSP</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="custId" class="form-label">
                            <span class="icon">🆔</span>
                            Cust Id
                        </label>
                        <input type="text" class="form-control" id="custId" name="custId" autocomplete="off"
                            maxlength="9" inputmode="text" spellcheck="false"
                            placeholder="Up to 9 letters or numbers"
                            aria-describedby="custIdHelp" pattern="[A-Za-z0-9]{1,9}">
                        <div id="custIdHelp" class="form-text">Letters and numbers only, maximum 9 characters.</div>
                    </div>

                    <div class="d-grid mb-4">
                        <button type="button" class="btn btn-primary btn-lg" id="revokeBtn" disabled>
                            Revoke Account linking
                        </button>
                    </div>
                </form>

                <div class="card mb-4" id="responseCard" style="display: none;">
                    <div class="card-body">
                        <h5 class="card-title mb-3">
                            <span class="icon">📨</span>
                            Response
                        </h5>
                        <div class="alert mb-0" id="responseAlert" role="alert"></div>
                        <pre id="responseData" class="mt-3 mb-0"
                            style="max-height: 400px; overflow-y: auto; background: #f8f9fa; padding: 15px; border-radius: 6px; font-size: 12px; display: none;"></pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="vendor/bootstrap-5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        const clientIds = {
            stenopool: {
                dev: '0oabpdi4tiT8wvJco0x7',
                qa: '0oabpdi4tiT8wvJco0x7',
                preprod: '0oabpdxojtQT6BShO0x7'
            },
            testStenopool: {
                dev: '0oad7jq9qeVOQsgFs0x7',
                qa: '0oad7jq9qeVOQsgFs0x7',
                preprod: '0oad7ku9teaNshEas0x7'
            }
        };

        const revokeEndpoint = 'https://insuleteu--jasmeetdev.sandbox.my.salesforce-sites.com/cloudtokenexchange/services/apexrest/revokeAccountLinking/';

        const environmentSelect = document.getElementById('environment');
        const clientIdSelect = document.getElementById('clientId');
        const custIdInput = document.getElementById('custId');
        const revokeBtn = document.getElementById('revokeBtn');
        const responseCard = document.getElementById('responseCard');
        const responseAlert = document.getElementById('responseAlert');
        const responseData = document.getElementById('responseData');

        const CUST_ID_MAX = 9;
        const CUST_ID_SAFE = /^[A-Za-z0-9]*$/;

        function updateClientIds() {
            const env = environmentSelect.value;
            if (!env) return;
            const stenopoolOption = document.getElementById('stenopool-option');
            const testEdspOption = document.getElementById('test-edsp-option');
            stenopoolOption.value = clientIds.stenopool[env];
            testEdspOption.value = clientIds.testStenopool[env];
        }

        /** Allow only A–Z, a–z, 0–9; cap length to block injection via pasted content. */
        function sanitizeCustId(raw) {
            const str = String(raw ?? '');
            return str.replace(/[^A-Za-z0-9]/g, '').slice(0, CUST_ID_MAX);
        }

        function getValidatedCustId() {
            const v = sanitizeCustId(custIdInput.value);
            if (custIdInput.value !== v) {
                custIdInput.value = v;
            }
            if (!v.length || v.length > CUST_ID_MAX || !CUST_ID_SAFE.test(v)) {
                return null;
            }
            return v;
        }

        function onCustIdInput() {
            const cleaned = sanitizeCustId(custIdInput.value);
            if (custIdInput.value !== cleaned) {
                custIdInput.value = cleaned;
            }
            updateRevokeButtonState();
        }

        function updateRevokeButtonState() {
            const env = environmentSelect.value;
            const partner = clientIdSelect.value;
            const custId = getValidatedCustId();
            revokeBtn.disabled = !(env && partner && custId);
        }

        function showResponse(success, message, detailText) {
            responseCard.style.display = 'block';
            responseAlert.className = success ? 'alert alert-success' : 'alert alert-danger';
            responseAlert.textContent = message;
            if (detailText) {
                responseData.style.display = 'block';
                responseData.textContent = detailText;
            } else {
                responseData.style.display = 'none';
                responseData.textContent = '';
            }
        }

        async function revokeAccountLinking() {
            const env = environmentSelect.value;
            const clientId = clientIdSelect.value;
            const customerId = getValidatedCustId();

            if (!env || !clientId || !customerId) {
                showResponse(false, 'Select environment and partner, and enter a valid Cust Id (1–9 letters or numbers).', '');
                return;
            }

            const originalHtml = revokeBtn.innerHTML;
            revokeBtn.disabled = true;
            revokeBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Working…';

            const payload = {
                environment: env,
                clientId: clientId,
                customerId: customerId
            };

            try {
                const response = await fetch(revokeEndpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const text = await response.text();
                let data;
                try {
                    data = text ? JSON.parse(text) : null;
                } catch {
                    data = null;
                }

                if (!response.ok) {
                    const errMsg = (data && (data.error || data.message)) || text || `HTTP ${response.status}`;
                    throw new Error(typeof errMsg === 'string' ? errMsg : JSON.stringify(errMsg));
                }

                const pretty = data != null ? JSON.stringify(data, null, 2) : (text || '');
                showResponse(true, `Success (${response.status})`, pretty);
            } catch (err) {
                console.error('Revoke request failed:', err);
                showResponse(false, err.message || 'Request failed', '');
            } finally {
                revokeBtn.disabled = false;
                revokeBtn.innerHTML = originalHtml;
                updateRevokeButtonState();
            }
        }

        environmentSelect.addEventListener('change', () => {
            updateClientIds();
            updateRevokeButtonState();
        });
        clientIdSelect.addEventListener('change', updateRevokeButtonState);
        custIdInput.addEventListener('input', onCustIdInput);
        custIdInput.addEventListener('paste', (e) => {
            e.preventDefault();
            const paste = (e.clipboardData || window.clipboardData).getData('text');
            custIdInput.value = sanitizeCustId(paste);
            updateRevokeButtonState();
        });
        revokeBtn.addEventListener('click', revokeAccountLinking);
    </script>
</body>

</html>
