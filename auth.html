<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Response</title>
    <!-- Import Bootstrap styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Import custom styles -->
    <link href="styles.css" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="page-header text-center mb-4">
                    <h1 class="page-title">
                        <span class="icon">🔐</span>
                        Authentication Response
                    </h1>
                </div>

                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">
                            <span class="icon">📋</span>
                            Query Parameters
                        </h5>
                        
                        <!-- State parameter from the OAuth callback -->
                        <div class="mb-3 param-group">
                            <label class="form-label">
                                <span class="icon">🏷️</span>
                                State
                            </label>
                            <div class="param-value" id="stateValue">
                                <span class="text-muted">No value provided</span>
                            </div>
                        </div>

                        <!-- Authorization code from the OAuth callback -->
                        <div class="mb-3 param-group">
                            <label class="form-label">
                                <span class="icon">🔑</span>
                                Authorization Code
                            </label>
                            <div class="param-value" id="authCodeValue">
                                <span class="text-muted">No value provided</span>
                            </div>
                        </div>

                    </div>
                </div>

                <!-- Card for making the API request -->
                <div class="card mb-4">
                    <div class="card-body">
                        <h5 class="card-title mb-3">
                            <span class="icon">🚀</span>
                            Product Cloud API Request
                        </h5>
                        
                        <!-- Button to trigger the API call -->
                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg" id="makeRequestBtn" onclick="makeProductCloudRequest()">
                                <span class="icon">📡</span>
                                Make a Request to Product Cloud
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Card to show the API response -->
                <div class="card mb-4" id="responseCard" style="display: none;">
                    <div class="card-body">
                        <h5 class="card-title mb-3">
                            <span class="icon">📨</span>
                            API Response
                        </h5>
                        <div class="alert" id="responseAlert" role="alert"></div>
                        <pre id="responseData" style="max-height: 400px; overflow-y: auto; background: #f8f9fa; padding: 15px; border-radius: 6px; font-size: 12px;"></pre>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Import Bootstrap JS library -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Extract the state and code from the URL query parameters
        function getQueryParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                state: params.get('state'),
                code: params.get('code'),
            };
        }

        // Show the parameter value in the UI, or a placeholder if it's missing
        function displayParam(elementId, value) {
            const element = document.getElementById(elementId);
            if (value) {
                element.innerHTML = `<code class="param-code">${escapeHtml(value)}</code>`;
            } else {
                element.innerHTML = '<span class="text-muted">No value provided</span>';
            }
        }

        // Sanitize text to prevent XSS attacks
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Exchange the authorization code for a Salesforce token
        async function callTokenExchange(authCode, codeVerifier, clientId) {
            const endpoint = 'https://insuleteu--jasmeetdev.sandbox.my.salesforce-sites.com/services/apexrest/cloudTokenExchange';
            const requestBody = {
                authCode: authCode,
                codeVerifier: codeVerifier,
                clientId: clientId
            }
            console.log('Request body:', JSON.stringify(requestBody));
            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || `HTTP error! status: ${response.status}`);
                }
                
                return { data, status: response.status };
            } catch (error) {
                console.error('Error calling token exchange:', error);
                throw error;
            }
        }

        // Make the API request to Product Cloud using the authorization code
        async function makeProductCloudRequest() {
            const params = getQueryParams();
            // get code verifier from session storage
            const codeVerifier = sessionStorage.getItem('pkceCodeVerifier');
            // get client id from session storage
            const clientId = sessionStorage.getItem('clientId');
            const authCode = params.code;

            // Make sure we actually have an auth code to work with
            if (!authCode) {
                alert('No authorization code found in URL');
                return;
            }

            // Update the button to show we're working on it
            const btn = document.getElementById('makeRequestBtn');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Loading...';

            try {
                // Call the token exchange endpoint - it handles everything internally
                const result = await callTokenExchange(authCode, codeVerifier, clientId);

                // Display response
                const responseCard = document.getElementById('responseCard');
                const responseAlert = document.getElementById('responseAlert');
                const responseData = document.getElementById('responseData');

                responseCard.style.display = 'block';

                responseAlert.className = 'alert alert-success';
                responseAlert.textContent = `✅ Success! Status: ${result.status}`;
                responseData.textContent = JSON.stringify(result.data, null, 2);

            } catch (error) {
                // Display error
                const responseCard = document.getElementById('responseCard');
                const responseAlert = document.getElementById('responseAlert');
                const responseData = document.getElementById('responseData');
                


                responseCard.style.display = 'block';
                responseAlert.className = 'alert alert-danger';
                responseAlert.textContent = `❌ Error: ${error.message || 'Error making request'}`;
                responseData.textContent = error.message || 'An error occurred while making the request.';
            } finally {
                // Put the button back to normal
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }
        
        // When the page loads, grab the query params and display them
        document.addEventListener('DOMContentLoaded', function() {
            const params = getQueryParams();
            
            displayParam('stateValue', params.state);
            displayParam('authCodeValue', params.code);
        });
    </script>

    <style>
        .card {
            border: none;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        .card-title {
            color: #16325c;
            font-weight: 600;
            border-bottom: 2px solid #e5e5e5;
            padding-bottom: 10px;
        }

        .param-group {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #16325c;
        }

        .param-group .form-label {
            margin-bottom: 8px;
        }

        .param-value {
            padding: 10px;
            background: white;
            border-radius: 4px;
            border: 1px solid #e0e0e0;
            word-break: break-all;
        }

        .param-code {
            color: #16325c;
            background: transparent;
            padding: 0;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
    </style>
</body>
</html>
